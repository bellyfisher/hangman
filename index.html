<!doctype html>
<html lang="en">
    <head>
        <title>Hangman Game!</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
          <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Carter+One&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <header class="row text-center">
            <div class="title">
                <img src="f1logo.png" alt="F1 Logo" class="w-25 animate__animated animate__lightSpeedInLeft">
                <h1 class="text-center">Hangman Game!</h1>
            </div>
            <h3 class="difficulty-title">Select a difficulty...</h3>
            <div class="col-4">
                <button id="Easymode" class="btn btn-success w-100">Easy - Terms</button>
            </div>
                        <div class="col-4">
                <button id="Intermediatemode" class="btn btn-warning w-100">Intermediate - Drivers</button>
            </div>
                        <div class="col-4">
                <button id="Difficultmode" class="btn btn-danger w-100">Difficult - Locations</button>

        </header>
        <main>
            <h1>Current Position: P1</h1>
            <div id="result1">
                <img src="winner.gif" alt="Winning Image" class="w-50">
                <br>
                <h1>You Win!</h1>
            </div>
            <div id="result2">

                <h1>You Crashed!</h1>
            </div>
             <div class="container-fluid px-0">
                <div class="row g-0">
                    <div class="col-6">
                             <div class="card">
                            <div class="card-body">
                                <h4 id="display" class="card-title">_ _ _ _ _ _ _ _ _</h4>
                                <div class="row g-2 mb-2">
                                    <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('A')">A</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('B')">B</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('C')">C</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('D')">D</button>
                                    </div>
                                                                                                            <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('E')">E</button>
                                    </div>
                                                                                                            <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('F')">F</button>
                                    </div>
                                </div>
<!-- ROW 2 -->
                                <div class="row g-2 mb-2">
                                    <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('G')">G</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('H')">H</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('I')">I</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('J')">J</button>
                                    </div>
                                                                                                            <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('K')">K</button>
                                    </div>
                                                                                                            <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('L')">L</button>
                                    </div>
                                </div>
<!-- ROW 3 -->
                                 <div class="row g-2 mb-2">
                                    <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('M')">M</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('N')">N</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('O')">O</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('P')">P</button>
                                    </div>
                                                                                                            <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('Q')">Q</button>
                                    </div>
                                                                                                            <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('R')">R</button>
                                    </div>
                                </div>
                                <!-- ROW 4 -->
                                 <div class="row g-2 mb-2">
                                    <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('S')">S</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('T')">T</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('U')">U</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('V')">V</button>
                                    </div>
                                                                                                            <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('W')">W</button>
                                    </div>
                                                                                                            <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('X')">X</button>
                                    </div>
                                    <!--ROW 5-->
                                                                    <div class="row g-2 mb-2">
                                    <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('Y')">Y</button>
                                    </div>
                                                                        <div class="col-2">
                                        <button class="btn btn-outline-dark w-100" onclick="pressLetter('Z')">Z</button>
                                    </div>
                                                                        <div class="col-8">
                                        <button class="btn btn-outline-light w-100" onclick="pressButton('Guess')">Guess</button>
                                    </div>
                                </div>
                    </div>
                            </div>
                             </div>
                    </div>
                <div class="col-6">
                             <div class="card">
                            <div class="card-body">
                                <h4 id="cardTitle" class="card-title">Wrong Guesses:</h4>
        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Libraries -->
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>
<script src="script.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
